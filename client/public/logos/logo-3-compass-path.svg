<svg width="490" height="150" viewBox="0 0 490 150" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Cormorant Garamond', serif">
  <defs>
    <linearGradient id="g3gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8d27a"/>
      <stop offset="1" stop-color="#d99211"/>
    </linearGradient>
    <clipPath id="g3clip"><circle cx="75" cy="75" r="50"/></clipPath>
  </defs>

  <!-- Roundel -->
  <circle cx="75" cy="75" r="58" fill="#0f1f3d"/>
  <circle cx="75" cy="75" r="58" fill="none" stroke="url(#g3gold)" stroke-width="2.5"/>
  <g clip-path="url(#g3clip)">
    <!-- distant peak -->
    <path d="M25 108 L58 60 L78 90 L100 56 L125 108 Z" fill="#1f3a6e"/>
    <path d="M100 56 L92 68 L97 70 L103 64 Z" fill="#f8d27a"/>
    <!-- winding dashed trail -->
    <path d="M40 116 C60 104 52 92 70 86 C88 80 84 70 99 60"
          fill="none" stroke="#edae2b" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 8"/>
    <!-- start pin -->
    <circle cx="40" cy="116" r="4.5" fill="#edae2b"/>
    <!-- summit star -->
    <path d="M99 54 l2.2 5 5.4 .4 -4.1 3.6 1.3 5.3 -4.8-2.9 -4.8 2.9 1.3-5.3 -4.1-3.6 5.4-.4 Z" fill="#f8d27a"/>
  </g>

  <!-- Wordmark -->
  <text x="158" y="74" font-size="42" font-weight="700">
    <tspan fill="#0f1f3d">My</tspan><tspan fill="#edae2b" font-family="'Segoe Script','Brush Script MT',cursive" font-style="italic" dx="2">Soul</tspan><tspan fill="#0f1f3d" dx="2">Trip</tspan>
  </text>
  <text x="159" y="98" font-size="12.5" letter-spacing="3" fill="#1f3a6e" font-family="Arial, sans-serif">EVERY JOURNEY HAS A SOUL</text>
</svg>
