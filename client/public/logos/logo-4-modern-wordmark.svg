<svg width="430" height="160" viewBox="0 0 430 160" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Cormorant Garamond', serif">
  <defs>
    <linearGradient id="g4gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5bc4a"/>
      <stop offset="1" stop-color="#d99211"/>
    </linearGradient>
  </defs>

  <!-- monoline peak arc rising over the wordmark -->
  <path d="M70 58 C120 20 150 20 168 44 L196 24 L224 50 C250 26 300 30 360 58"
        fill="none" stroke="url(#g4gold)" stroke-width="3.2" stroke-linecap="round"/>
  <!-- summit star -->
  <path d="M196 14 l2.4 5.4 5.9 .5 -4.5 3.9 1.4 5.8 -5.2-3.2 -5.2 3.2 1.4-5.8 -4.5-3.9 5.9-.5 Z" fill="#edae2b"/>
  <!-- tiny peak mark -->
  <path d="M180 47 L196 26 L212 47 Z" fill="#0f1f3d"/>
  <path d="M196 26 L190 35 L196 37 L202 35 Z" fill="#ffffff"/>

  <!-- Wordmark -->
  <text x="215" y="104" font-size="52" font-weight="700" text-anchor="middle">
    <tspan fill="#0f1f3d">My</tspan><tspan fill="#edae2b" font-family="'Segoe Script','Brush Script MT',cursive" font-style="italic" dx="2">Soul</tspan><tspan fill="#0f1f3d" dx="2">Trip</tspan>
  </text>

  <!-- tagline -->
  <g>
    <line x1="120" y1="128" x2="150" y2="128" stroke="#edae2b" stroke-width="1.6"/>
    <text x="215" y="132" font-size="12.5" letter-spacing="4" fill="#1f3a6e" text-anchor="middle" font-family="Arial, sans-serif">TRAVEL · EXPLORE · REMEMBER</text>
    <line x1="280" y1="128" x2="310" y2="128" stroke="#edae2b" stroke-width="1.6"/>
  </g>
</svg>
